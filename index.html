<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТОП vs ҰЖЫМ • психологиялық тест</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0a1a;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 60, 120, 0.25) 0%, transparent 30%),
                radial-gradient(circle at 90% 70%, rgba(0, 255, 200, 0.2) 0%, transparent 35%),
                repeating-linear-gradient(45deg, rgba(30, 20, 50, 0.4) 0px, rgba(30, 20, 50, 0.4) 2px, 
                                          rgba(50, 30, 70, 0.4) 2px, rgba(50, 30, 70, 0.4) 6px);
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #f0eaff;
        }

        /* Дерзкий контейнер — рваный край, неон */
        .quiz-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(12, 8, 24, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 2px solid;
            border-image: repeating-linear-gradient(45deg, #ff3a7a, #00ffcc, #ff3a7a) 30;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 58, 122, 0.5), 0 0 0 2px rgba(0, 255, 200, 0.3) inset;
            border-radius: 48px 12px 48px 12px;
            transform: rotate(0.2deg);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: borderPulse 3s infinite alternate;
        }

        @keyframes borderPulse {
            0% { border-image: repeating-linear-gradient(45deg, #ff3a7a, #00ffcc, #ff3a7a) 30; box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 58, 122, 0.6); }
            100% { border-image: repeating-linear-gradient(45deg, #00ffcc, #ff3a7a, #00ffcc) 30; box-shadow: 0 30px 70px rgba(0, 255, 200, 0.5), 0 0 50px rgba(255, 58, 122, 0.7); }
        }

        .quiz-container:hover {
            transform: rotate(0deg) scale(1.005);
        }

        /* хедер — панк-рок */
        .header {
            padding: 28px 24px 16px 24px;
            border-bottom: 3px dashed #ff3a7a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff6a0, #ffb3c6, #a6fff2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px #ff3a7a, 4px 4px 0 #0c0a1a;
            line-height: 1;
            margin: 0;
        }

        .badge {
            background: #000;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            box-shadow: 0 0 20px #00ffcc;
            transform: rotate(-1deg);
            transition: 0.2s;
        }

        .badge:hover {
            transform: rotate(1deg) scale(1.05);
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 40px #00ffcc;
        }

        /* прогресс бар — агрессив */
        .progress-area {
            padding: 16px 24px 8px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .progress-track {
            flex: 1;
            height: 24px;
            background: #1e1a2f;
            border-radius: 100px;
            border: 2px solid #ff3a7a;
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.8), 0 0 10px #ff3a7a;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3a7a, #ffb347, #00ffcc);
            border-radius: 100px;
            box-shadow: 0 0 30px #ffb347;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .stats {
            display: flex;
            gap: 24px;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .stats span {
            background: #1f1a33;
            padding: 8px 20px;
            border-radius: 60px;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 10px #00ffcc;
        }

        /* основной блок — дерзость */
        .main-stage {
            padding: 24px;
            min-height: 380px;
            position: relative;
        }

        /* анимация слайдов с overshoot */
        .screen {
            display: none;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .screen.active {
            display: block;
            animation: overshootPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes overshootPop {
            0% { opacity: 0; transform: translateY(60px) scale(0.8); }
            50% { opacity: 1; transform: translateY(-10px) scale(1.02); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* вопросы */
        .question-title {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff, #ffd6e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .question-sub {
            font-size: 1rem;
            color: #b9b0d4;
            margin-bottom: 24px;
            border-left: 8px solid #ff3a7a;
            padding-left: 16px;
            font-style: italic;
        }

        /* варианты — психо */
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }

        .answer-item {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #4a3f70;
            border-radius: 30px 8px 30px 8px;
            padding: 18px 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .answer-item:hover:not(.disabled) {
            border-color: #ff3a7a;
            transform: translateY(-6px) scale(1.02) rotate(-0.5deg);
            box-shadow: 0 20px 30px #ff3a7a80, 0 0 30px #00ffcc;
            background: #2a1f44;
        }

        .answer-item input[type="radio"] {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 3px solid #ff3a7a;
            border-radius: 0px 12px 0px 12px;
            background: transparent;
            transition: 0.1s;
            cursor: pointer;
        }

        .answer-item input[type="radio"]:checked {
            background: #ff3a7a;
            box-shadow: 0 0 30px #ff3a7a, inset 0 0 0 4px #00ffcc;
            transform: rotate(90deg);
        }

        .answer-item.disabled {
            opacity: 0.8;
            cursor: not-allowed;
            filter: grayscale(0.4);
        }

        .answer-item.correct {
            border-color: #00ffcc;
            background: rgba(0, 255, 200, 0.15);
            box-shadow: 0 0 30px #00ffcc;
        }

        .answer-item.wrong {
            border-color: #ff3a7a;
            background: rgba(255, 58, 122, 0.2);
            box-shadow: 0 0 30px #ff3a7a;
        }

        /* фидбек зона */
        .feedback-block {
            margin: 20px 0 0;
            padding: 20px;
            border: 3px solid;
            border-image: repeating-linear-gradient(45deg, #ff3a7a, #00ffcc) 30;
            background: #0e0b1a;
            border-radius: 30px 4px 30px 4px;
            display: none;
            animation: glitch 0.4s;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -4px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }

        .feedback-block.good {
            border-color: #00ffcc;
            box-shadow: 0 0 40px #00ffcc;
        }
        .feedback-block.bad {
            border-color: #ff3a7a;
            box-shadow: 0 0 40px #ff3a7a;
        }

        .fb-title {
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        .fb-desc {
            font-size: 1rem;
            color: #ccc2f0;
        }

        /* кнопки — сочные */
        .action-buttons {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 32px;
            font-weight: 900;
            font-size: 1.2rem;
            text-transform: uppercase;
            background: #121020;
            border: 3px solid #ff3a7a;
            color: #ff3a7a;
            border-radius: 60px 8px 60px 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 0 #52001f, 0 0 20px #ff3a7a;
            flex: 1 1 auto;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 0 #52001f, 0 0 50px #ff3a7a;
            border-color: #00ffcc;
            color: #00ffcc;
            background: #1f1a40;
        }

        .btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 5px 0 #52001f;
        }

        .btn.primary {
            background: #ff3a7a;
            color: #0c0a1a;
            border-color: #00ffcc;
            box-shadow: 0 10px 0 #6b0030, 0 0 30px #00ffcc;
        }

        .btn.primary:hover {
            background: #00ffcc;
            color: #0c0a1a;
            border-color: #ff3a7a;
            box-shadow: 0 15px 0 #006b55, 0 0 60px #ff3a7a;
        }

        .btn:disabled {
            opacity: 0.3;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* результат */
        .result-panel {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .score-ring {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: conic-gradient(#00ffcc 0deg, #ff3a7a 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 60px #ff3a7a;
            animation: spinRing 4s infinite linear;
        }

        @keyframes spinRing {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .score-ring::before {
            content: '';
            width: 110px;
            height: 110px;
            background: #0c0a1a;
            border-radius: 50%;
            position: absolute;
            border: 3px solid #ff3a7a;
        }

        .score-value {
            position: relative;
            font-size: 2rem;
            font-weight: 900;
            z-index: 2;
            background: linear-gradient(135deg, #fff, #ffb3c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-text h2 {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
        }
        .result-text p {
            font-size: 1.2rem;
            color: #c0b4e6;
        }

        footer {
            padding: 16px 24px;
            text-align: center;
            color: #6a5e8a;
            border-top: 2px dashed #ff3a7a;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <h1>💥 ТОП VS ҰЖЫМ 💥</h1>
            <div class="badge">психологиялық тест</div>
        </div>

        <div class="progress-area">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="stats">
                <span id="qCounter">0/10</span>
                <span id="scoreDisplay">0</span>
            </div>
        </div>

        <div class="main-stage">
            <!-- start -->
            <section id="startScreen" class="screen active">
                <div style="padding: 40px 20px; text-align: center;">
                    <div style="font-size: 4rem; filter: drop-shadow(0 0 30px #ff3a7a);">🧠⚡</div>
                    <h2 style="font-size: 2.5rem; margin: 20px 0;">Басқарудағы топ және ұжым?</h2>
                    <p style="font-size: 1.2rem; margin-bottom: 40px; color: #b9aef0;"><br>10 сұрақ.</p>
                    <button class="btn primary" id="startBtn">МЕН ДАЙЫНМЫН </button>
                </div>
            </section>

            <!-- quiz -->
            <section id="quizScreen" class="screen">
                <div class="question-title" id="questionText"></div>
                <div class="question-sub" id="questionSub"></div>

                <div class="answers-grid" id="answersContainer"></div>

                <div class="feedback-block" id="feedbackBlock">
                    <div class="fb-title" id="fbTitle"></div>
                    <div class="fb-desc" id="fbDesc"></div>
                </div>

                <div class="action-buttons">
                    <button class="btn" id="prevBtn" disabled>← АРТҚА</button>
                    <button class="btn primary" id="nextBtn" disabled>КЕЛЕСІ →</button>
                </div>
            </section>

            <!-- result -->
            <section id="resultScreen" class="screen">
                <div class="result-panel">
                    <div class="score-ring" id="scoreRing">
                        <span class="score-value" id="scoreFraction">0/10</span>
                    </div>
                    <div class="result-text">
                        <h2 id="resultTitle"></h2>
                        <p id="resultDesc"></p>
                    </div>
                </div>
                <div class="action-buttons" style="margin-top: 40px;">
                    <button class="btn" id="reviewBtn">ҚАЙТА ҚАРАУ</button>
                    <button class="btn primary" id="restartBtn">ЖАҢАДАН 🚀</button>
                </div>
            </section>
        </div>
        <footer>Әр сұрақ — миға соққы. Тек шынайы жауап бер.</footer>
    </div>

    <script>
        (function() {
            // Сұрақтар массиві
            const questions = [
                {
                    title: "№1 СЕНІҢ ОЙЫҢША, ТОП ПЕН ҰЖЫМНЫҢ АЙЫРМАСЫ?",
                    sub: "бір ғана дұрыс жауап",
                    options: [
                        "ұжымда психологиялық байланыс күшті, ортақ рух бар",
                        "топ тек формальды, ұжым тек бейформальды",
                        "ұжым деген кез келген адамдар тобы",
                        "топта лидер болмайды, ұжымда болады"
                    ],
                    correct: 0,
                    why: "Дұрыс! Ұжым — ортақ құндылық, сенім, мақсат. Топ — жай ғана бірге жүргендер."
                },
                {
                    title: "№2 ФОРМАЛЬДЫ ТОП ДЕГЕНІМІЗ...",
                    sub: "таңда, бірақ ойлан",
                    options: [
                        "басшылық бұйрығымен құрылған топ",
                        "коридорда достасып қалғандар",
                        "интернеттегі кездейсоқ чат",
                        "тек отбасы мүшелері"
                    ],
                    correct: 0,
                    why: "Иә! Формальды топ — лауазымдық міндеттерге сай құрылады."
                },
                {
                    title: "№3 БЕЙФОРМАЛЬДЫ ТОП ҚАЛАЙ ПАЙДА БОЛАДЫ?",
                    sub: "қалай ойлайсың?",
                    options: [
                        "адамдардың ортақ қызығушылығынан",
                        "директордың бұйрығынан кейін",
                        "еңбек келісім-шарты бойынша",
                        "сот шешімімен"
                    ],
                    correct: 0,
                    why: "Дұрыс! Бейформальды — жүрек қалауы, достық, ортақ әзіл."
                },
                {
                    title: "№4 ЕҢ ТИІМДІ ТОП МӨЛШЕРІ?",
                    sub: "статистика, брат",
                    options: [
                        "3-4 адам",
                        "5-11 адам",
                        "15-20 адам",
                        "25+ адам"
                    ],
                    correct: 1,
                    why: "5-11! Әркім сөйлей алады, басқаруға жеңіл."
                },
                {
                    title: "№5 АВТОРИТАРЛЫҚ СТИЛЬ ҚАШАН ТИІМДІ?",
                    sub: "ойлан, мұнда қателесуге болмайды",
                    options: [
                        "шығармашылық кезде",
                        "төтенше жағдайда",
                        "демалыс күні",
                        "ешқашан"
                    ],
                    correct: 1,
                    why: "Дағдарыс, соғыс, апат кезінде — тек авторитарлық!"
                },
                {
                    title: "№6 ДЕМОКРАТИЯЛЫҚ СТИЛЬДІҢ АРТЫҚШЫЛЫҒЫ?",
                    sub: "енді шатаспа",
                    options: [
                        "жылдам шешім",
                        "қызметкерлердің белсенділігі артады",
                        "басшы ештеңе істемейді",
                        "тәртіп өте қатал"
                    ],
                    correct: 1,
                    why: "Адамдар өзін маңызды сезініп, жанымен жұмыс істейді."
                },
                {
                    title: "№7 ЛИДЕР МЕН БАСШЫНЫҢ АЙЫРМАСЫ?",
                    sub: "бұл классика",
                    options: [
                        "лидер — жүректен, басшы — лауазымнан",
                        "лидерді тағайындайды, басшыны сайлайды",
                        "еш айырма жоқ",
                        "басшы әрқашан лидер"
                    ],
                    correct: 0,
                    why: "Лауазым — басшы, ықпал — лидер. Адамдар лидерге еріп жүреді."
                },
                {
                    title: "№8 ТОПТЫҚ НОРМАЛАР ДЕГЕН...",
                    sub: "қандай ереже?",
                    options: [
                        "заңдар жинағы",
                        "жазылмаған мінез-құлық стандарттары",
                        "директордың бұйрығы",
                        "ешкім білмейді"
                    ],
                    correct: 1,
                    why: "Иә, мысалы «біз кешікпейміз» немесе «киім коды жоқ»."
                },
                {
                    title: "№9 ПСИХОЛОГИЯЛЫҚ КЛИМАТ ДЕГЕН НЕ?",
                    sub: "сезінесің бе?",
                    options: [
                        "бөлмедегі ауа",
                        "адамдар арасындағы көңіл-күй, сенім",
                        "жалақы мөлшері",
                        "жұмыс уақыты"
                    ],
                    correct: 1,
                    why: "Бұл — ұжымның рухы, шиеленіс немесе жылулық."
                },
                {
                    title: "№10 БИЛІК ДЕГЕНІМІЗ?",
                    sub: "финал, батыр",
                    options: [
                        "тек ақша",
                        "адамдардың мінез-құлқына әсер ету мүмкіндігі",
                        "тек лауазым",
                        "күш көрсету"
                    ],
                    correct: 1,
                    why: "Билік — әсер ету. Ақша, білім, харизма — бәрі билік."
                }
            ];

            // state
            let currentIndex = 0;
            let score = 0;
            let userPicks = new Array(questions.length).fill(null);
            let answered = new Array(questions.length).fill(false);

            // DOM
            const startScreen = document.getElementById('startScreen');
            const quizScreen = document.getElementById('quizScreen');
            const resultScreen = document.getElementById('resultScreen');
            const progressFill = document.getElementById('progressFill');
            const qCounter = document.getElementById('qCounter');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const questionText = document.getElementById('questionText');
            const questionSub = document.getElementById('questionSub');
            const answersContainer = document.getElementById('answersContainer');
            const feedbackBlock = document.getElementById('feedbackBlock');
            const fbTitle = document.getElementById('fbTitle');
            const fbDesc = document.getElementById('fbDesc');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const startBtn = document.getElementById('startBtn');
            const reviewBtn = document.getElementById('reviewBtn');
            const restartBtn = document.getElementById('restartBtn');
            const scoreRing = document.getElementById('scoreRing');
            const scoreFraction = document.getElementById('scoreFraction');
            const resultTitle = document.getElementById('resultTitle');
            const resultDesc = document.getElementById('resultDesc');

            function showScreen(screen) {
                [startScreen, quizScreen, resultScreen].forEach(s => s.classList.remove('active'));
                screen.classList.add('active');
            }

            function updateProgress() {
                qCounter.innerText = `${currentIndex + 1}/${questions.length}`;
                scoreDisplay.innerText = score;
                progressFill.style.width = `${((currentIndex + 1) / questions.length) * 100}%`;
            }

            function renderQuestion() {
                const q = questions[currentIndex];
                questionText.innerText = q.title;
                questionSub.innerText = q.sub;

                let html = '';
                q.options.forEach((opt, idx) => {
                    const checked = (userPicks[currentIndex] === idx) ? 'checked' : '';
                    html += `
                        <label class="answer-item ${answered[currentIndex] ? 'disabled' : ''} ${answered[currentIndex] && idx === q.correct ? 'correct' : ''} ${answered[currentIndex] && userPicks[currentIndex] === idx && idx !== q.correct ? 'wrong' : ''}">
                            <input type="radio" name="answer" value="${idx}" ${checked} ${answered[currentIndex] ? 'disabled' : ''}>
                            <span>${opt}</span>
                        </label>
                    `;
                });
                answersContainer.innerHTML = html;

                if (answered[currentIndex]) {
                    const wasCorrect = (userPicks[currentIndex] === q.correct);
                    feedbackBlock.style.display = 'block';
                    feedbackBlock.className = `feedback-block ${wasCorrect ? 'good' : 'bad'}`;
                    fbTitle.innerText = wasCorrect ? '✅ ДҰРЫС!' : '❌ ҚАТЕ!';
                    fbDesc.innerText = q.why;
                } else {
                    feedbackBlock.style.display = 'none';
                }

                // radio listeners
                document.querySelectorAll('.answer-item input[type="radio"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        if (answered[currentIndex]) return;
                        const val = parseInt(e.target.value);
                        userPicks[currentIndex] = val;
                        answered[currentIndex] = true;
                        if (val === q.correct) score += 1;
                        renderQuestion();
                        updateProgress();
                        nextBtn.disabled = false;
                    });
                });

                prevBtn.disabled = (currentIndex === 0);
                nextBtn.disabled = !answered[currentIndex];
                nextBtn.innerText = (currentIndex === questions.length - 1) ? 'НОТИЖЕ →' : 'КЕЛЕСІ →';
                updateProgress();
            }

            function showResult() {
                const total = questions.length;
                const percent = Math.round((score / total) * 100);
                scoreFraction.innerText = `${score}/${total}`;
                const deg = (score / total) * 360;
                scoreRing.style.background = `conic-gradient(#00ffcc 0deg, #ff3a7a ${deg}deg, #1e1a2f ${deg}deg)`;

                let title, desc;
                if (percent >= 80) { title = 'СЕН ТУҒАН КӨШБАСШЫ!'; desc = 'Ұжымды сезесің, лидерлік қаныңда.'; }
                else if (percent >= 60) { title = 'ЖАҚСЫ, БІРАҚ ӘЛЕ БОЛМАДЫ'; desc = 'Бірнеше нәрсені жетілдір.'; }
                else { title = 'ҚАЙТА ОҚЫ, БРАТ'; desc = 'Теория керек, бірақ сен түзелесің.'; }

                resultTitle.innerText = title;
                resultDesc.innerText = desc;
                showScreen(resultScreen);
            }

            startBtn.addEventListener('click', () => {
                currentIndex = 0; score = 0; userPicks.fill(null); answered.fill(false);
                showScreen(quizScreen);
                renderQuestion();
            });

            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderQuestion();
                }
            });

            nextBtn.addEventListener('click', () => {
                if (currentIndex === questions.length - 1) {
                    showResult();
                } else {
                    currentIndex++;
                    renderQuestion();
                }
            });

            reviewBtn.addEventListener('click', () => {
                currentIndex = 0;
                showScreen(quizScreen);
                renderQuestion();
            });

            restartBtn.addEventListener('click', () => {
                currentIndex = 0; score = 0; userPicks.fill(null); answered.fill(false);
                showScreen(quizScreen);
                renderQuestion();
            });

            // бастапқы
            showScreen(startScreen);
        })();
    </script>
</body>
</html>
